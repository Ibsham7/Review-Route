name: Keep Render Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        env:
          URL: https://reviewroute-backend.onrender.com
        run: |
          if [ -z "$URL" ]; then
            echo "WARNING: RENDER_BACKEND_URL secret not set. Set the secret in repo settings or replace with a URL."
            exit 0
          fi
          echo "Pinging $URL"
          status=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP status: $status"
          # keep workflow success to avoid noisy failures
          exit 0
